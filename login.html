<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Vape AH</title>
    <meta name="description" content="Login Admin untuk Vape AH - Premium Vape Experience.">
    <!-- Google Fonts: Outfit (Sesuai dengan index) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="assets/css/login.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Background Gradient (Sesuai dengan index) -->
    <div class="bg-overlay"></div>

    <div class="login-container">
        <main class="login-card glass fade-in">
            <header class="logo-section">
                <div class="logo text-gradient">VAPE AH</div>
                <p>Admin Control Panel</p>
            </header>

            <form action="#" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="username" name="username" placeholder="Masukkan username admin" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="login-btn btn-primary">
                    <span>Masuk Sekarang</span>
                    <i data-lucide="log-in" style="width: 18px"></i>
                </button>
                
                <p id="statusMessage"></p>
            </form>

            <footer class="footer-text">
                <p>&copy; 2024 Vape AH Admin</p>
            </footer>
        </main>
    </div>

    <script src="assets/js/login.js"></script>
    <script>
        // Inisialisasi Icon Lucide
        lucide.createIcons();
    </script>
</body>
</html>
